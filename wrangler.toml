name = "ai-forwarder"
compatibility_date = "2025-02-21"
main = "src/index.ts"
assets = { directory = "public", binding = "ASSETS" }

[ai]
binding = "AI"

[vars]
DEFAULT_AI_MODEL = "@cf/meta/llama-3-8b-instruct"
# Note: API_KEY is set as a secret in Cloudflare dashboard, not here

# Optional: override models used by the auto/route intelligent routing feature.
# When a client requests model "auto" or "auto/route", the proxy picks the tier
# below that best matches the request's tools and context size.
# AUTO_ROUTE_CHEAP_MODEL    = "@cf/meta/llama-3-8b-instruct"    # no tools, small context
# AUTO_ROUTE_TOOL_MODEL     = "@cf/qwen/qwen3-30b-a3b-fp8"      # tools present, moderate context
# AUTO_ROUTE_ADVANCED_MODEL = "@cf/zai-org/glm-4.7-flash"       # large context or many tools

[[kv_namespaces]]
binding = "CACHE"
id = "802cf2efee064993bebc235b53830317"
preview_id = "46191dba66f74ce8939ea4876152aa2d"

# wrangler.toml (wsrangler v3.88.0^)
[observability.logs]
enabled = true

[dev]
host = "dev-worker.metalevel.tech"
